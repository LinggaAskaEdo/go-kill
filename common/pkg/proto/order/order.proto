syntax = "proto3";

package order;

option go_package = "github.com/yourusername/microservices/proto/order";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
}

message OrderItem {
  string product_id = 1;
  int32 quantity = 2;
}

message CreateOrderRequest {
  string user_id = 1;
  repeated OrderItem items = 2;
  string shipping_address_id = 3;
  string billing_address_id = 4;
  string payment_method = 5;
}

message CreateOrderResponse {
  bool success = 1;
  string order_id = 2;
  string order_number = 3;
  double total_amount = 4;
  string error = 5;
}

message GetOrderRequest {
  string order_id = 1;
  string user_id = 2;
}

message OrderItemDetail {
  string id = 1;
  string product_id = 2;
  string product_name = 3;
  int32 quantity = 4;
  double unit_price = 5;
  double subtotal = 6;
}

message GetOrderResponse {
  string id = 1;
  string order_number = 2;
  string status = 3;
  double total_amount = 4;
  repeated OrderItemDetail items = 5;
  bool found = 6;
}

message ListOrdersRequest {
  string user_id = 1;
  int32 page = 2;
  int32 limit = 3;
}

message ListOrdersResponse {
  repeated GetOrderResponse orders = 1;
  int32 total = 2;
}

message CancelOrderRequest {
  string order_id = 1;
  string user_id = 2;
  string reason = 3;
}

message CancelOrderResponse {
  bool success = 1;
  string error = 2;
}
