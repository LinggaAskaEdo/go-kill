logger:
  enabled: true
  level: info # debug, info, warn, error
  format: json # json, console
  output: stdout # stdout, file
  path: ./logs/app.log
  max_size: 100 # megabytes
  max_backups: 7
  max_age: 30 # days
  compress: true # disabled by default

redis:
  enabled: true
  network: tcp
  address: "localhost:6379"
  password: ""
  db: 0
  cache_ttl: 60s
  max_retries: 3
  min_retry_backoff: 8ms
  max_retry_backoff: 512ms
  dial_timeout: 5s
  read_timeout: 3s
  write_timeout: 3s
  pool_size: 10
  min_idle_conns: 5
  max_idle_conns: 5
  max_active_conns: 10
  pool_timeout: 30s

mongo:
  mongo-0:
    host: localhost
    port: 27017
    database: analytics_db
    username: ""
    password: ""
    auth_source: ""
    timeout: 10s

repository:
  analytics:
    order_colllection: order_analytics
    prodcut_collection: product_analytics

kafka_consumer:
  brokers:
    - localhost:9092
  group_id: analytics-service-group
  topics:
    - order.created
    - order.cancelled

  # Initial offset when no committed offset exists.
  # Use -1 for newest (default), -2 for oldest.
  initial_offset: -1

  # Timeout for network operations (dial, read, write)
  dial_timeout: 5s
  read_timeout: 10s
  write_timeout: 10s
  consumer_group_session_timeout: 20s
  consumer_group_heartbeat_interval: 6s

kafka_producer:
  brokers:
    - localhost:9092
  retry_max: 3
  timeout: 5s
